# Single render.yaml at repo root — Render auto-detects this file.
# Both services build from workspace root so Turbo caching works across packages.
# Mobile (Expo) is NOT deployed here — use EAS Build instead.
#
# DNS (Cloudflare) — target state:
#   CNAME  www  → jefflink-web.onrender.com
#   CNAME  api  → jefflink-api.onrender.com        ← mobile app hits https://api.jefflinkcars.com/api/v1
#   CNAME  cdn  → pub-ac2067b6a2264561b99c6c807174ff78.r2.dev  (Proxied — no change needed)
#
# Production checklist (Render source of truth):
#   API required secrets: DATABASE_URL, JWT_SECRET, JWT_REFRESH_SECRET, REDIS_URL,
#                         ADMIN_SEED_PASSWORD, R2_ACCOUNT_ID, R2_ACCESS_KEY_ID,
#                         R2_SECRET_ACCESS_KEY, R2_BUCKET
#   API required fixed values: NODE_ENV=production, ADMIN_SEED_EMAIL=admin@jefflinkcars.com,
#                              ADMIN_SEED_ROLE=SUPER_ADMIN, WEB_APP_URL=https://jefflinkcars.com,
#                              R2_PUBLIC_URL=https://cdn.jefflinkcars.com,
#                              CDN_BASE_URL=https://cdn.jefflinkcars.com,
#                              AUTH_EXPOSE_RESET_TOKEN=false
#   Web required fixed values: NODE_ENV=production, NEXT_PUBLIC_API_BASE_URL=/api/v1,
#                              BACKEND_URL=http://jefflink-api:10000,
#                              INTERNAL_API_URL=http://jefflink-api:10000/api/v1,
#                              NEXT_PUBLIC_SITE_URL=https://jefflinkcars.com,
#                              NEXT_PUBLIC_CDN_URL=https://cdn.jefflinkcars.com
#   Drift check after env changes: redeploy jefflink-api first, then jefflink-web,
#                                  verify https://api.jefflinkcars.com/api/health,
#                                  admin login, password reset email, and CDN media URLs.

services:

  # ─── API Service (NestJS) ─────────────────────────────────────────────────
  # Cloudflare CNAME: api.jefflinkcars.com → jefflink-api.onrender.com
  - type: web
    name: jefflink-api
    env: node
    plan: starter
    rootDir: .
    buildCommand: "pnpm install --frozen-lockfile --prod=false && pnpm turbo run build --filter=jefflink-backend"
    startCommand: sh -c "node apps/backend/scripts/run-admin-migration.cjs; node apps/backend/scripts/seed-admin.cjs || true; node apps/backend/dist/main.js"
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: REDIS_URL
        sync: false
      - key: ADMIN_SEED_EMAIL
        value: admin@jefflinkcars.com
      - key: ADMIN_SEED_PASSWORD
        sync: false
      - key: ADMIN_SEED_ROLE
        value: SUPER_ADMIN
      - key: CORS_ORIGINS
        value: https://jefflinkcars.com,https://www.jefflinkcars.com,https://jefflink.onrender.com,https://jefflink-web.onrender.com
      - key: WEB_APP_URL
        value: https://jefflinkcars.com
      - key: AUTH_EXPOSE_RESET_TOKEN
        value: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_PUBLIC_URL
        value: https://cdn.jefflinkcars.com
      - key: CDN_BASE_URL
        value: https://cdn.jefflinkcars.com

  # ─── Web Service (Next.js 15) ──────────────────────────────────────────────
  # Cloudflare CNAME: www.jefflinkcars.com → jefflink-web.onrender.com
  - type: web
    name: jefflink-web
    env: node
    plan: starter
    rootDir: .
    buildCommand: "pnpm install --frozen-lockfile --prod=false && pnpm turbo run build --filter=@jefflink/web"
    startCommand: pnpm --filter @jefflink/web start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_BASE_URL
        value: /api/v1
      - key: BACKEND_URL
        value: http://jefflink-api:10000
      - key: INTERNAL_API_URL
        value: http://jefflink-api:10000/api/v1
      - key: NEXT_PUBLIC_SITE_URL
        value: https://jefflinkcars.com
      - key: NEXT_PUBLIC_CDN_URL
        value: https://cdn.jefflinkcars.com
