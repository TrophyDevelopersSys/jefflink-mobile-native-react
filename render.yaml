# Single render.yaml at repo root — Render auto-detects this file.
# Both services build from workspace root so Turbo caching works across packages.
# Mobile (Expo) is NOT deployed here — use EAS Build instead.
#
# DNS (Cloudflare) — target state:
#   CNAME  www  → jefflink-web.onrender.com
#   CNAME  api  → jefflink-api.onrender.com        ← mobile app hits https://api.jefflinkcars.com/api/v1
#   CNAME  cdn  → pub-ac2067b6a2264561b99c6c807174ff78.r2.dev  (Proxied — no change needed)

services:

  # ─── API Service (NestJS) ─────────────────────────────────────────────────
  # Cloudflare CNAME: api.jefflinkcars.com → jefflink-api.onrender.com
  - type: web
    name: jefflink-api
    env: node
    plan: starter
    rootDir: .
    buildCommand: "pnpm install --frozen-lockfile && pnpm turbo run build --filter=jefflink-backend"
    startCommand: node apps/backend/dist/main.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: REDIS_URL
        sync: false
      - key: CORS_ORIGINS
        value: https://jefflinkcars.com,https://www.jefflinkcars.com
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL
        value: https://cdn.jefflinkcars.com
      - key: CDN_BASE_URL
        value: https://cdn.jefflinkcars.com

  # ─── Web Service (Next.js 15) ──────────────────────────────────────────────
  # Cloudflare CNAME: www.jefflinkcars.com → jefflink-web.onrender.com
  - type: web
    name: jefflink-web
    env: node
    plan: starter
    rootDir: .
    buildCommand: "pnpm install --frozen-lockfile && pnpm turbo run build --filter=@jefflink/web"
    startCommand: pnpm --filter @jefflink/web start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://api.jefflinkcars.com/api/v1
      - key: NEXT_PUBLIC_SITE_URL
        value: https://jefflinkcars.com
      - key: NEXT_PUBLIC_CDN_URL
        value: https://cdn.jefflinkcars.com
