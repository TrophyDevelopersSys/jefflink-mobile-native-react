services:
  - type: web
    name: jefflink-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false        # set manually in Render dashboard
      - key: JWT_SECRET
        sync: false        # set manually in Render dashboard
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: REDIS_URL
        sync: false        # set manually in Render dashboard
      - key: CORS_ORIGINS
        value: https://jefflink.onrender.com
